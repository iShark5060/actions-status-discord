name: Release

permissions:
  contents: read

env:
  NODE_VERSION: 24

on:
  release:
    types: [published]

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build action
        run: pnpm run build

      - name: Verify action bundle
        run: node --check lib/index.mjs

      - name: Attest action.yml
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: action.yml

      - name: Attest lib/index.mjs
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: lib/index.mjs

      - name: Create version tag
        uses: JasonEtco/build-and-tag-action@dd5e4991048c325f6d85b4155e586fc211c644da # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Push source tag
        shell: bash
        run: |
          TAGNAME=${{ github.ref_name }}-src
          git tag "$TAGNAME" ${{ github.sha }}
          git push origin "$TAGNAME"

  e2e:
    needs: build-and-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os:
          - ubuntu-slim
          - ubuntu-latest
          - ubuntu-24.04
          - ubuntu-22.04
          - windows-latest
          - windows-2025
          - windows-2022
          - ubuntu-24.04-arm
          - ubuntu-22.04-arm
          - windows-11-arm
          - macos-15-intel
          - macos-latest
          - macos-14
          - macos-15
          - macos-26

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Run action
        uses: ./
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          content: '<@${{ secrets.DISCORD_USERID }}>'
          title: e2e - ${{ github.ref_name }} - ${{ matrix.os }}
          description: |
            Tag: `${{ github.ref_name }}`
            Build artifact SHA: `${{ github.sha }}`
          nofail: false
          image: https://user-images.githubusercontent.com/33576079/81886735-69e03f80-95d8-11ea-8828-fa10dda8afd1.png
          color: 0xFFFFFF
          username: GitHub Actions
          avatar_url: ${{ secrets.AVATAR_URL }}
          ack_no_webhook: true

  notify:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read

    steps:
      - name: Resolve workflow conclusion
        uses: actions/github-script@v9
        id: conclusion
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            })
            const conclusions = jobs.jobs.map(j => j.conclusion).filter(Boolean)
            const priority = ['failure', 'timed_out', 'cancelled', 'action_required', 'neutral', 'success', 'skipped', 'stale']
            const conclusion = priority.find(p => conclusions.includes(p)) ?? (conclusions.length ? conclusions[0] : 'success')
            core.setOutput('conclusion', conclusion)

      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Send Discord notification
        uses: ./
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ steps.conclusion.outputs.conclusion }}
          title: ${{ github.workflow }} - conclusion
          content: '<@${{ secrets.DISCORD_USERID }}>'
          ack_no_webhook: true
